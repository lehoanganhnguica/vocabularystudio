<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Studio — Classroom Vocabulary Teaching Tool</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;line-height:1.5}
  header{background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);color:white;padding:.85rem 1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.1)}
  .header-inner{max-width:96rem;margin:0 auto;display:flex;flex-wrap:wrap;gap:1rem;align-items:center;justify-content:space-between}
  h1{font-size:1.4rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
  .header-right{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
  nav{display:flex;flex-wrap:wrap;gap:.25rem;background:rgba(255,255,255,.15);padding:.25rem;border-radius:.5rem}
  nav button{background:transparent;border:none;color:white;padding:.4rem .75rem;border-radius:.4rem;cursor:pointer;font-size:.9rem;font-weight:500;transition:background .15s}
  nav button:hover{background:rgba(255,255,255,.2)}
  nav button.active{background:white;color:#4f46e5}
  .sound-toggle{background:rgba(255,255,255,.15);border:none;color:white;padding:.5rem .7rem;border-radius:.4rem;cursor:pointer;font-size:1rem;transition:background .15s}
  .sound-toggle:hover{background:rgba(255,255,255,.25)}
  main{max-width:96rem;margin:0 auto;padding:1rem 1.25rem}
  .card{background:white;border-radius:.75rem;padding:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e2e8f0}
  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1rem;border-radius:.5rem;font-size:.95rem;font-weight:500;border:none;cursor:pointer;transition:all .15s}
  .btn-primary{background:#4f46e5;color:white}
  .btn-primary:hover{background:#4338ca}
  .btn-primary:disabled{background:#cbd5e1;cursor:not-allowed}
  .btn-secondary{background:#e2e8f0;color:#334155}
  .btn-secondary:hover{background:#cbd5e1}
  .btn-success{background:#10b981;color:white}
  .btn-success:hover{background:#059669}
  .btn-danger{background:#ef4444;color:white}
  .btn-danger:hover{background:#dc2626}
  .btn-ghost{background:transparent;color:#64748b}
  .btn-ghost:hover{background:#f1f5f9}
  .btn-lg{padding:.8rem 1.6rem;font-size:1.1rem}
  .row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
  .row-between{display:flex;gap:.5rem;align-items:center;justify-content:space-between;flex-wrap:wrap}
  textarea,input[type=text]{width:100%;border:1px solid #cbd5e1;border-radius:.5rem;padding:.6rem .8rem;font-size:.9rem;font-family:inherit}
  textarea:focus,input:focus{outline:2px solid #4f46e5;outline-offset:-1px;border-color:transparent}
  textarea{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.8rem}
  .empty{text-align:center;padding:3rem 1rem;color:#64748b;border:2px dashed #cbd5e1;border-radius:.75rem;background:white}
  .grid{display:grid;gap:.75rem;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .word-card{background:white;border:1px solid #e2e8f0;border-radius:.75rem;padding:1rem;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .word-card h3{color:#4f46e5;font-size:1.15rem;margin-bottom:.1rem}
  .word-card .ipa{color:#0891b2;font-family:ui-monospace,monospace;font-size:.9rem;margin-bottom:.25rem}
  .word-card .vn{color:#64748b;font-style:italic;font-size:.85rem}
  .word-card .meaning{font-size:.9rem;color:#475569;margin:.4rem 0}
  .word-card .ex{font-size:.9rem;color:#64748b;border-left:3px solid #c7d2fe;padding-left:.6rem;margin-top:.4rem}
  .hl{background:#fde68a;color:#92400e;padding:0 3px;border-radius:3px;font-weight:600}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:1rem;z-index:50}
  .modal{background:white;border-radius:.75rem;padding:1.5rem;max-width:52rem;width:100%;max-height:92vh;overflow:auto}
  .hidden{display:none!important}
  .toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);padding:.6rem 1.2rem;border-radius:.5rem;color:white;z-index:60;font-size:.95rem;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.15)}
  .toast.success{background:#10b981}
  .toast.error{background:#ef4444}
  .toast.info{background:#3b82f6}

  .tabs{display:flex;gap:.25rem;border-bottom:2px solid #e2e8f0;margin-bottom:1.25rem}
  .tab{background:transparent;border:none;padding:.6rem 1rem;cursor:pointer;font-size:.9rem;font-weight:600;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit}
  .tab:hover{color:#4f46e5}
  .tab.active{color:#4f46e5;border-bottom-color:#4f46e5}
  .step{background:#eef2ff;border-left:4px solid #4f46e5;padding:.85rem 1rem;border-radius:.4rem;margin-bottom:.75rem;font-size:.9rem;line-height:1.6}
  .step b{color:#4f46e5}
  .step-num{display:inline-flex;align-items:center;justify-content:center;width:1.5rem;height:1.5rem;background:#4f46e5;color:white;border-radius:50%;font-size:.8rem;font-weight:700;margin-right:.4rem}
  .prompt-box{background:#0f172a;color:#e2e8f0;border-radius:.5rem;padding:1rem 1.1rem;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.82rem;line-height:1.65;white-space:pre-wrap;word-break:break-word;max-height:24rem;overflow-y:auto;border:1px solid #334155}
  .prompt-box .ph{color:#fbbf24;font-weight:700;background:rgba(251,191,36,.15);padding:1px 4px;border-radius:3px}
  .prompt-box .cmt{color:#94a3b8;font-style:italic}
  .info-banner{background:#fef3c7;border:1px solid #f59e0b;color:#92400e;padding:.7rem .9rem;border-radius:.5rem;font-size:.9rem;margin-bottom:1rem;line-height:1.5}

  /* =================== FLASHCARDS =================== */
  .teach-stage{background:white;border-radius:1rem;padding:1.5rem 2rem;text-align:center;min-height:55vh;display:flex;flex-direction:column;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.05);position:relative;overflow:hidden}
  .teach-word{font-size:clamp(3.5rem,11vw,8rem);font-weight:800;color:#4f46e5;margin-bottom:.3rem;letter-spacing:-.02em;line-height:1}
  .teach-ipa{font-family:ui-monospace,Menlo,monospace;font-size:clamp(1.4rem,3.5vw,2.2rem);color:#0891b2;margin-bottom:1rem}
  .teach-example{font-size:clamp(1.4rem,3.2vw,2rem);color:#475569;font-style:italic;max-width:62rem;margin:0 auto 1rem;line-height:1.5}
  .teach-meaning{font-size:clamp(1.4rem,3vw,1.9rem);color:#0f172a;font-weight:500;margin-bottom:.4rem;padding-top:.8rem;border-top:1px dashed #cbd5e1;animation:fadeIn .5s}
  .teach-vn{font-size:clamp(1.2rem,2.4vw,1.6rem);color:#7c3aed;font-style:italic;animation:fadeIn .8s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .progress{background:#e2e8f0;border-radius:99px;height:6px;overflow:hidden;margin-bottom:.75rem}
  .progress-bar{background:linear-gradient(90deg,#4f46e5,#7c3aed);height:100%;transition:width .3s}
  .sparkle{position:absolute;pointer-events:none;font-size:1.8rem;animation:sparkleAnim 1s ease-out forwards}
  @keyframes sparkleAnim{0%{opacity:0;transform:scale(0)}30%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(.5) translateY(-30px)}}

  /* =================== QUIZ =================== */
  .quiz-q{font-size:clamp(1.6rem,3.5vw,2.4rem);margin-bottom:1.5rem;text-align:center;color:#0f172a;font-weight:500;line-height:1.4;padding:0 .5rem}
  .quiz-options{display:grid;gap:.85rem;grid-template-columns:repeat(2,minmax(0,1fr));max-width:64rem;margin:0 auto}
  .quiz-opt{padding:1.3rem 1.4rem;border:2px solid #e2e8f0;border-radius:.7rem;background:white;cursor:pointer;text-align:center;font-size:clamp(1.2rem,2.5vw,1.6rem);font-weight:600;transition:all .15s;font-family:inherit;line-height:1.4}
  .quiz-opt:hover:not(:disabled){border-color:#a5b4fc;background:#eef2ff;transform:translateY(-1px)}
  .quiz-opt.correct{border-color:#10b981;background:#d1fae5;color:#065f46}
  .quiz-opt.wrong{border-color:#ef4444;background:#fee2e2;color:#991b1b}
  .quiz-opt:disabled{cursor:default}
  .quiz-ipa-mode{font-family:ui-monospace,monospace}
  @media (max-width:640px){.quiz-options{grid-template-columns:1fr}}

  /* =================== MATCH =================== */
  .match-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.7rem;max-width:80rem;margin:0 auto}
  .match-tile{padding:1.1rem .8rem;border:2px solid #e2e8f0;border-radius:.7rem;background:white;cursor:pointer;font-size:clamp(1.1rem,2vw,1.4rem);font-weight:600;text-align:center;transition:all .15s;min-height:5rem;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1.3}
  .match-tile:hover:not(:disabled){border-color:#a5b4fc;background:#fafbff;transform:translateY(-1px)}
  .match-tile.selected{border-color:#4f46e5;background:#eef2ff;transform:scale(1.02)}
  .match-tile.matched{border-color:#10b981;background:#d1fae5;color:#065f46;cursor:default;opacity:.75}
  .match-tile.flash-wrong{border-color:#ef4444;background:#fee2e2}
  @media (max-width:900px){.match-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}

  /* =================== SCRAMBLE =================== */
  .scramble-slots{display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;margin:1.25rem 0;min-height:5rem}
  .scramble-slot{width:4.5rem;height:5rem;border:2px dashed #cbd5e1;border-radius:.5rem;display:flex;align-items:center;justify-content:center;font-size:2.4rem;font-weight:700;color:#4f46e5;background:#f8fafc;text-transform:lowercase}
  .scramble-slot.filled{border-style:solid;border-color:#4f46e5;background:#eef2ff;cursor:pointer}
  .scramble-slot.correct{border-color:#10b981;background:#d1fae5;color:#065f46}
  .scramble-slot.wrong{border-color:#ef4444;background:#fee2e2;color:#991b1b}
  .scramble-tiles{display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;margin-top:1rem}
  .scramble-tile{width:4.5rem;height:5rem;border:2px solid #4f46e5;background:white;border-radius:.5rem;font-size:2.4rem;font-weight:700;color:#4f46e5;cursor:pointer;transition:all .15s;font-family:inherit}
  .scramble-tile:hover{background:#eef2ff;transform:translateY(-2px)}
  .scramble-tile:disabled{opacity:.3;cursor:default;transform:none}
  .ipa-hint{font-family:ui-monospace,monospace;color:#0891b2;font-size:1.5rem;margin-bottom:.5rem}

  /* =================== SAVE THE DAY — HORIZONTAL DYNAMIC SCENE =================== */
  .lotus-stage{
    display:flex;flex-direction:row;align-items:center;gap:1.5rem;
    padding:1.25rem;border-radius:1rem;
    background:linear-gradient(135deg,#fef3c7 0%,#fce7f3 45%,#ede9fe 100%);
    position:relative;overflow:hidden;border:1px solid #e9d5ff;
    box-shadow:0 1px 3px rgba(0,0,0,.05);
    min-height:60vh;
  }
  .lotus-stage::before{content:'';position:absolute;inset:0;background:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,.7), transparent 35%),
    radial-gradient(circle at 85% 80%, rgba(196,181,253,.4), transparent 40%);
    pointer-events:none;z-index:0}
  .lotus-stage > *{position:relative;z-index:1}
  .lotus-left{flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .lotus-right{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:.9rem}
  .scene-wrap{display:flex;justify-content:center;align-items:center;width:100%;max-width:30rem;perspective:600px;position:relative}
  .scene-svg{width:100%;display:block;filter:drop-shadow(0 12px 22px rgba(79,70,229,.22));transition:filter .3s}
  .scene-svg.shake{animation:sceneShake .55s cubic-bezier(.36,.07,.19,.97) both}
  .scene-svg.pulse{animation:scenePulse .6s ease both}
  .scene-svg.win{animation:sceneWin 1s ease both}
  .scene-svg.lose{animation:sceneLose .8s ease both;filter:drop-shadow(0 10px 18px rgba(0,0,0,.2)) grayscale(.4) brightness(.85)}

  @keyframes sceneShake{
    0%,100%{transform:translateX(0) rotate(0)}
    15%{transform:translateX(-10px) rotate(-1.5deg)}
    30%{transform:translateX(10px) rotate(1.5deg)}
    45%{transform:translateX(-8px) rotate(-1deg)}
    60%{transform:translateX(8px) rotate(1deg)}
    75%{transform:translateX(-4px) rotate(-.5deg)}
    90%{transform:translateX(4px) rotate(.5deg)}
  }
  @keyframes scenePulse{
    0%,100%{transform:scale(1);filter:drop-shadow(0 12px 22px rgba(79,70,229,.22))}
    50%{transform:scale(1.06);filter:drop-shadow(0 0 30px rgba(16,185,129,.7)) brightness(1.08)}
  }
  @keyframes sceneWin{
    0%{transform:scale(1)}
    25%{transform:scale(1.12) rotate(-3deg)}
    50%{transform:scale(1.08) rotate(3deg)}
    75%{transform:scale(1.1) rotate(-2deg)}
    100%{transform:scale(1) rotate(0)}
  }
  @keyframes sceneLose{
    0%{transform:scale(1)}
    50%{transform:scale(.96) translateY(4px)}
    100%{transform:scale(1) translateY(0)}
  }
  @keyframes svgSway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
  @keyframes svgPetalBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  @keyframes svgGlow{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
  @keyframes svgBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  @keyframes svgSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes svgFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-3px) rotate(3deg)}}
  @keyframes svgWobble{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}
  @keyframes svgWheel{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes svgBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}
  @keyframes svgFlicker{0%,100%{opacity:.9}50%{opacity:.6}}
  @keyframes svgShimmer{0%,100%{opacity:.5;transform:translateX(0)}50%{opacity:1;transform:translateX(2px)}}

  .lotus-header{display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap}
  .lotus-scene-title{font-size:clamp(1.3rem,2.4vw,1.7rem);font-weight:700;color:#7c3aed}
  .lotus-lives{background:rgba(255,255,255,.85);backdrop-filter:blur(4px);padding:.5rem 1rem;border-radius:99px;font-size:1rem;font-weight:600;color:#475569;display:inline-flex;align-items:center;gap:.4rem;border:1px solid rgba(255,255,255,.8)}

  .lotus-word{
    display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;
    font-family:ui-monospace,monospace;
    font-size:clamp(2.6rem,6vw,4.2rem);
    font-weight:800;color:#4f46e5;letter-spacing:.05em;
    margin:.25rem 0
  }
  .lotus-letter{
    min-width:1.5em;border-bottom:4px solid #4f46e5;
    text-align:center;background:rgba(255,255,255,.6);
    border-radius:.4rem .4rem 0 0;
    padding:.1rem .25rem .05rem;transition:all .3s;line-height:1.05
  }
  .lotus-letter.revealed{animation:letterReveal .5s ease}
  @keyframes letterReveal{0%{transform:scale(1.4) rotate(-10deg);color:#10b981}100%{transform:scale(1) rotate(0);color:#4f46e5}}

  .lotus-meaning{
    font-size:clamp(1.4rem,2.6vw,2rem);font-weight:600;color:#0f172a;
    text-align:center;line-height:1.35;
    background:rgba(255,255,255,.9);backdrop-filter:blur(6px);
    padding:.85rem 1rem;border-radius:.7rem;border:1px solid #e9d5ff;
    box-shadow:0 2px 8px rgba(124,58,237,.08)
  }
  .lotus-meta{
    display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;
    font-size:clamp(1rem,1.8vw,1.2rem);color:#64748b;
    margin-top:.1rem
  }
  .lotus-meta .vn{color:#7c3aed;font-style:italic;font-weight:500}
  .lotus-meta .ipa{font-family:ui-monospace,monospace;color:#0891b2}
  .lotus-meta .len{color:#94a3b8}

  .lotus-keys{
    display:grid;grid-template-columns:repeat(13,minmax(0,1fr));gap:.35rem;width:100%;
    margin:.3rem auto 0
  }
  .lotus-key{
    padding:.85rem 0;border:2px solid #cbd5e1;border-radius:.5rem;background:white;
    cursor:pointer;font-weight:700;
    font-size:clamp(1rem,1.6vw,1.3rem);
    transition:all .15s;font-family:inherit
  }
  .lotus-key:hover:not(:disabled){background:#eef2ff;border-color:#4f46e5;transform:translateY(-2px);box-shadow:0 4px 8px rgba(79,70,229,.15)}
  .lotus-key.hit{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-color:#10b981;color:#065f46;animation:keyHit .4s ease}
  .lotus-key.miss{background:linear-gradient(135deg,#fee2e2,#fecaca);border-color:#ef4444;color:#991b1b;animation:keyMiss .4s ease}
  @keyframes keyHit{0%{transform:scale(1.2);box-shadow:0 0 0 8px rgba(16,185,129,.3)}100%{transform:scale(1);box-shadow:none}}
  @keyframes keyMiss{0%{transform:scale(1) translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}100%{transform:translateX(0)}}
  .lotus-key:disabled{cursor:default}

  .burst{position:absolute;pointer-events:none;font-size:1.6rem;z-index:5;animation:burstFly 1.1s ease-out forwards}
  @keyframes burstFly{
    0%{opacity:0;transform:translate(0,0) scale(.4)}
    20%{opacity:1;transform:translate(var(--bx,0),var(--by,-10px)) scale(1.1)}
    100%{opacity:0;transform:translate(calc(var(--bx,0) * 1.5),calc(var(--by,-60px) * 1.8)) scale(.6) rotate(180deg)}
  }
  .lives-pip{display:inline-block;width:1.1rem;height:1.1rem;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 1px 2px rgba(0,0,0,.1);transition:all .3s}
  .lives-pip.lost{background:#e2e8f0;transform:scale(.65);opacity:.5}
  .lives-pips{display:inline-flex;gap:3px;align-items:center}

  .lotus-end{
    text-align:center;padding:.75rem;border-radius:.7rem;
    background:rgba(255,255,255,.92);backdrop-filter:blur(6px);
    border:1px solid #e9d5ff
  }
  .lotus-end.win{border-color:#10b981;background:#d1fae5cc}
  .lotus-end.lose{border-color:#ef4444;background:#fee2e2cc}

  .badge{display:inline-flex;align-items:center;gap:.3rem;padding:.4rem .8rem;border-radius:99px;background:#eef2ff;color:#4f46e5;font-size:.95rem;font-weight:600}

  .footer{text-align:center;color:#94a3b8;font-size:.8rem;padding:1.5rem 1rem 2rem;line-height:1.7}
  .footer .contact{margin-top:.5rem;color:#64748b}
  .footer a{color:#4f46e5;text-decoration:none;font-weight:500}
  .footer a:hover{text-decoration:underline}

  @media (max-width:1024px){
    .lotus-keys{grid-template-columns:repeat(9,minmax(0,1fr))}
  }
  @media (max-width:900px){
    .lotus-stage{flex-direction:column;min-height:auto}
    .scene-wrap{max-width:22rem}
    .lotus-right{width:100%}
  }
  @media (max-width:640px){
    .lotus-keys{grid-template-columns:repeat(7,minmax(0,1fr))}
    .teach-stage{padding:1rem;min-height:45vh}
    .scramble-slot,.scramble-tile{width:3rem;height:3.5rem;font-size:1.6rem}
    .modal{padding:1rem}
    .tab{padding:.5rem .6rem;font-size:.8rem}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>📚 Vocab Studio</h1>
    <div class="header-right">
      <nav id="nav">
        <button data-view="library" class="active">📖 Library</button>
        <button data-view="flashcards">🃏 Flashcards</button>
        <button data-view="quiz">❓ Quiz</button>
        <button data-view="match">🔗 Match</button>
        <button data-view="scramble">🔤 Scramble</button>
        <button data-view="lotus">🛟 Save the Day</button>
      </nav>
      <button id="sound-toggle" class="sound-toggle" title="Toggle sound">🔊</button>
    </div>
  </div>
</header>

<main id="app"></main>

<div class="footer">
  Works fully offline · Save this file to your computer to use without internet
  <div class="contact">
    Contact: <a href="https://www.facebook.com/lkhoang.gnaohkl/" target="_blank" rel="noopener">Hoàng Lê (Facebook)</a>
    · <a href="mailto:hoanglk@uef.edu.vn">hoanglk@uef.edu.vn</a>
    · <a href="mailto:lehoang.anhnguica@gmail.com">lehoang.anhnguica@gmail.com</a>
  </div>
</div>

<div id="toast" class="toast hidden"></div>
<div id="modal-root"></div>

<script>
const sound = {
  enabled: true, ctx: null, master: null,
  init(){
    if(!this.ctx){
      try{
        const AC = window.AudioContext || window.webkitAudioContext;
        if(!AC) return;
        this.ctx = new AC();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.7;
        this.master.connect(this.ctx.destination);
      }catch(e){ this.enabled = false; }
    }
    if(this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  tone(freq, dur, opts={}){
    if(!this.enabled || !this.ctx) return;
    const { type='sine', vol=0.15, when=0, attack=0.005 } = opts;
    const t0 = this.ctx.currentTime + when;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(this.master);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
  },
  sweep(f1, f2, dur, opts={}){
    if(!this.enabled || !this.ctx) return;
    const { type='sine', vol=0.15, when=0 } = opts;
    const t0 = this.ctx.currentTime + when;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f1, t0);
    osc.frequency.exponentialRampToValueAtTime(Math.max(f2,1), t0 + dur);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(this.master);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
  },
  noise(dur, opts={}){
    if(!this.enabled || !this.ctx) return;
    const { vol=0.08, when=0, freq=2000, q=5 } = opts;
    const t0 = this.ctx.currentTime + when;
    const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i] = Math.random()*2-1;
    const src = this.ctx.createBufferSource(); src.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = freq; filter.Q.value = q;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(filter).connect(gain).connect(this.master);
    src.start(t0); src.stop(t0 + dur);
  },
  click(){ this.tone(900, 0.04, {type:'square', vol:0.06}); },
  softClick(){ this.tone(600, 0.03, {type:'triangle', vol:0.05}); },
  pop(){ this.sweep(700, 250, 0.08, {type:'sine', vol:0.1}); },
  tap(){ this.tone(750, 0.05, {type:'triangle', vol:0.08}); this.tone(1500, 0.03, {type:'sine', vol:0.04, when:0.005}); },

  shuffle(){ for(let i=0;i<8;i++) this.tone(200 + Math.random()*600, 0.03, {type:'square', vol:0.05, when:i*0.04}); },
  correct(){

  fanfare(){

function stripMd(s){
  return (s||'')
    .replace(/\*\*(.+?)\*\*/g,'$1').replace(/__(.+?)__/g,'$1')
    .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'$1')
    .replace(/`(.+?)`/g,'$1').trim();
}
function looksLikeIPA(s){
  if(!s) return false;
  if(/^[\/\[].*[\/\]]$/.test(s.trim())) return true;
  return /[ˈˌəɪʊɔɛæʃʒθðŋːɑɒɜɝɚʌɐ]/.test(s);
}
function parseTable(text){
  let lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(!lines.length) return [];
  lines = lines.filter(l => !/^\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)*\|?\s*$/.test(l));
  if(!lines.length) return [];
  const pipeLines = lines.filter(l=>l.includes('|')).length;
  const tabLines = lines.filter(l=>l.includes('\t')).length;
  let rows;
  if(pipeLines >= Math.max(2, Math.floor(lines.length*0.6))){
    rows = lines.map(l => l.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim()));
  } else if(tabLines >= 1){
    rows = lines.map(l => l.split('\t').map(c=>c.trim()));
  } else {
    rows = lines.map(l => l.split(/\s{2,}/).map(c=>c.trim()));
  }
  rows = rows.map(r => r.map(stripMd)).filter(r => r.some(c => c.length));
  if(!rows.length) return [];
  const hints = ['word','ipa','pronunciation','phonetic','meaning','definition','vietnamese','translation','vn','cue','example','sentence','simple'];
  const first = rows[0].map(c=>c.toLowerCase());
  const hasHeader = first.some(c => hints.some(h => c.includes(h)));
  const headers = hasHeader ? first : null;
  const data = hasHeader ? rows.slice(1) : rows;
  const idx = { word:0, ipa:-1, meaning:-1, translation:-1, example:-1 };
  if(headers){
    headers.forEach((h,i)=>{
      if(/ipa|pronunc|phonetic/.test(h)) idx.ipa = i;
      else if(/word|term|vocab/.test(h) && !/sentence/.test(h)) idx.word = i;
      else if(/meaning|definition|simple/.test(h)) idx.meaning = i;
      else if(/vietnamese|translation|cue|tiếng|^vn$/i.test(h)) idx.translation = i;
      else if(/example|sentence|context/.test(h)) idx.example = i;
    });
  } else {
    const sampleRow = data[0] || [];
    let ipaCol = -1;
    sampleRow.forEach((c,i)=>{ if(i!==0 && ipaCol===-1 && looksLikeIPA(c)) ipaCol = i; });
    if(ipaCol !== -1){
      idx.ipa = ipaCol;
      const rest = sampleRow.map((_,i)=>i).filter(i=>i!==0 && i!==ipaCol);
      idx.meaning = rest[0] ?? -1;
      idx.translation = rest[1] ?? -1;
      idx.example = rest[2] ?? -1;
    } else {
      idx.meaning = 1; idx.translation = 2;
      idx.example = sampleRow.length >= 4 ? 3 : -1;
    }
  }
  return data.map(r => ({
    id: uid(),
    word: (r[idx.word]||'').trim(),
    ipa: idx.ipa>=0 ? (r[idx.ipa]||'').trim() : '',
    meaning: idx.meaning>=0 ? (r[idx.meaning]||'').trim() : '',
    translation: idx.translation>=0 ? (r[idx.translation]||'').trim() : '',
    example: idx.example>=0 ? (r[idx.example]||'').trim() : ''
  })).filter(w => w.word);
}

}

    .replace(/\[TYPE YOUR WORDS HERE.*?\]/g, m=>`<span class="ph">${m}</span>`)
    .replace(/\[CHANGE THIS.*?\]/g, m=>`<span class="ph">${m}</span>`)
    .replace(/^(Rules:|Important formatting rules:|---)$/gm, m=>`<span class="cmt">${m}</span>`);

function copyPrompt(){
  const btn = $('copy-btn');
  const done = ()=>{
    sound.ding();
    btn.textContent = '✅ Copied!';
    btn.classList.remove('btn-primary');
    btn.classList.add('btn-success');
    setTimeout(()=>{
      btn.textContent = '📎 Copy prompt';
      btn.classList.add('btn-primary');
      btn.classList.remove('btn-success');
    }, 2000);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(CHATGPT_PROMPT).then(done).catch(fallbackCopy);
  } else fallbackCopy();
  function fallbackCopy(){
    const ta = document.createElement('textarea');
    ta.value = CHATGPT_PROMPT;
    ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); done(); }
    catch(e){ toast('Could not copy. Please select the text manually.','error'); }
    document.body.removeChild(ta);
  }
}

function doImport(){
  const text = $('paste').value;
  if(!text.trim()){ sound.wrong(); toast('Paste a table first.','error'); return; }
  try{
    const parsed = parseTable(text);
    if(!parsed.length){ sound.wrong(); toast('Could not parse any rows.','error'); return; }
    state.words = state.words.concat(parsed);
    save(); closeModal(); render();
    sound.fanfare();
    toast(`Imported ${parsed.length} word${parsed.length===1?'':'s'}.`,'success');

function nextQuizQuestion(){
  if(state.words.length<2){ state.quizQ=null; return; }
  const correctIdx = Math.floor(Math.random()*state.words.length);
  const correct = state.words[correctIdx];
  const distractors = sample(state.words.filter((_,i)=>i!==correctIdx), Math.min(3, state.words.length-1));
  const opts = shuffle([correct, ...distractors]);
  const modes = ['meaning'];
  if(correct.example) modes.push('sentence');
  if(correct.ipa && state.words.filter(w=>w.ipa).length>=2) modes.push('ipa');
  const mode = modes[Math.floor(Math.random()*modes.length)];
  state.quizQ = { correct, opts, mode, answered:false, picked:null };
}
function renderQuiz(app){
  if(!state.quizQ){ app.innerHTML = `<div class="empty"><p>Need at least 2 words for the quiz.</p></div>`; return; }
  const q = state.quizQ;
  let prompt;
  if(q.mode==='sentence' && q.correct.example){
    const blanked = q.correct.example.replace(new RegExp('\\b'+q.correct.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\w*\\b','gi'),'_____');
    prompt = `Fill in the blank:<br><span style="font-style:italic;color:#475569;display:inline-block;margin-top:.5rem">"${escapeHtml(blanked)}"</span>`;
  } else if(q.mode==='ipa' && q.correct.ipa){
    prompt = `Which word is pronounced:<br><span class="quiz-ipa-mode" style="color:#0891b2;font-size:1.4em;display:inline-block;margin-top:.5rem">${escapeHtml(q.correct.ipa)}</span>`;
  } else {
    prompt = `Which word means:<br><b style="display:inline-block;margin-top:.5rem">${escapeHtml(q.correct.meaning||'(no meaning)')}</b>${q.correct.translation?`<br><span style="font-size:.75em;color:#7c3aed;font-style:italic">(${escapeHtml(q.correct.translation)})</span>`:''}`;
  }
  app.innerHTML = `
    <div class="row-between" style="margin-bottom:1rem">
      <span class="badge" style="font-size:1.05rem;padding:.5rem 1rem">Score: ${state.quizScore} / ${state.quizTotal}</span>
      <button class="btn btn-secondary" onclick="quizReset()">🔄 Reset score</button>
    </div>
    <div class="card" style="padding:1.5rem 1.25rem">
      <div class="quiz-q">${prompt}</div>
      <div class="quiz-options">
        ${q.opts.map(o=>`
          <button class="quiz-opt ${q.answered?(o.id===q.correct.id?'correct':(o.id===q.picked?'wrong':'')):''}"
            ${q.answered?'disabled':''} onclick="quizPick('${o.id}')">
            ${escapeHtml(o.word)}
          </button>
        `).join('')}
      </div>
      ${q.answered?`
        <div style="text-align:center;margin-top:1.5rem">
          ${q.picked===q.correct.id
            ? `<div style="color:#10b981;font-weight:700;font-size:1.5rem">✅ Correct! <b>${escapeHtml(q.correct.word)}</b>${q.correct.ipa?` <span style="font-family:ui-monospace,monospace;color:#0891b2;font-size:1rem">${escapeHtml(q.correct.ipa)}</span>`:''}</div>`
            : `<div style="color:#ef4444;font-weight:700;font-size:1.4rem">❌ The answer was <b>${escapeHtml(q.correct.word)}</b>${q.correct.ipa?` <span style="font-family:ui-monospace,monospace;color:#0891b2;font-size:1rem">${escapeHtml(q.correct.ipa)}</span>`:''}</div>`}
          <button class="btn btn-primary btn-lg" style="margin-top:1rem" onclick="quizNext()">Next question →</button>
        </div>
      `:''}
    </div>
  `;
}
function quizPick(id){
  const q = state.quizQ;
  q.picked = id; q.answered = true;
  state.quizTotal++;
  if(id===q.correct.id){ state.quizScore++; sound.correct(); } else { sound.wrong(); }
  render();
}
function quizNext(){ sound.softClick(); nextQuizQuestion(); render(); }
function quizReset(){ sound.pop(); state.quizScore=0; state.quizTotal=0; nextQuizQuestion(); render(); }

function initMatch(){
  const pool = sample(state.words, Math.min(6, state.words.length));
  const left = pool.map(w=>({key:w.id+'-w', text:w.word, pairId:w.id, side:'L'}));
  const right = pool.map(w=>({key:w.id+'-m', text:w.meaning||w.translation||'(no meaning)', pairId:w.id, side:'R'}));
  state.matchPairs = shuffle([...left, ...right]);
  state.matchSelected = null; state.matchMatched = new Set(); state.matchMoves = 0;
}
function renderMatch(app){
  const pairs = state.matchPairs;
  const totalPairs = pairs.length/2;
  const matchedCount = state.matchMatched.size/2;
  const done = matchedCount===totalPairs;
  app.innerHTML = `
    <div class="row-between" style="margin-bottom:.75rem">
      <div class="row">
        <span class="badge" style="font-size:1.05rem;padding:.5rem 1rem">Matched: ${matchedCount} / ${totalPairs}</span>
        <span class="badge" style="font-size:1.05rem;padding:.5rem 1rem">Moves: ${state.matchMoves}</span>
      </div>
      <button class="btn btn-secondary" onclick="matchNew()">🔄 New round</button>
    </div>
    ${done?`<div class="card" style="text-align:center;background:#d1fae5;border-color:#10b981;margin-bottom:1rem;padding:1rem">
      <div style="font-size:2rem">🎉</div>
      <div style="font-weight:700;color:#065f46;font-size:1.2rem">Great work! All matched in ${state.matchMoves} moves.</div>
    </div>`:''}
    <p style="text-align:center;color:#475569;font-size:1.1rem;margin-bottom:1rem;font-weight:500">Click a word, then click its meaning (or vice versa).</p>
    <div class="match-grid">
      ${pairs.map(p=>{
        const matched = state.matchMatched.has(p.key);
        const selected = state.matchSelected===p.key;
        return `<button class="match-tile ${matched?'matched':''} ${selected?'selected':''}" onclick="matchClick('${p.key}')" ${matched?'disabled':''}>
          ${escapeHtml(p.text)}
        </button>`;
      }).join('')}
    </div>
  `;
}
function matchNew(){ sound.shuffle(); initMatch(); render(); }
function matchClick(key){
  if(state.matchMatched.has(key)) return;
  if(state.matchSelected===key){ sound.softClick(); state.matchSelected=null; render(); return; }
  if(!state.matchSelected){ sound.select(); state.matchSelected = key; render(); return; }
  state.matchMoves++;
  const a = state.matchPairs.find(p=>p.key===state.matchSelected);
  const b = state.matchPairs.find(p=>p.key===key);
  if(a.pairId===b.pairId && a.side!==b.side){
    state.matchMatched.add(a.key); state.matchMatched.add(b.key);
    state.matchSelected = null; sound.ding(); render();
    if(state.matchMatched.size===state.matchPairs.length){ setTimeout(()=>sound.fanfare(), 350); toast('All matched! 🎉','success'); }
  } else {
    sound.wrong();
    const prev = state.matchSelected;
    state.matchSelected = null; render();
    const elA = document.querySelector(`[onclick="matchClick('${prev}')"]`);
    const elB = document.querySelector(`[onclick="matchClick('${key}')"]`);
    elA?.classList.add('flash-wrong'); elB?.classList.add('flash-wrong');
    setTimeout(()=>{ elA?.classList.remove('flash-wrong'); elB?.classList.remove('flash-wrong'); }, 500);
  }
}

function initScramble(){
  const w = state.words[state.scIdx];
  state.scTiles = shuffle(w.word.split('').map((ch,i)=>({ch,id:i,used:false})));
  state.scAnswer = []; state.scResult = null;
}
function renderScramble(app){
  const w = state.words[state.scIdx];
  app.innerHTML = `
    <div class="row-between" style="margin-bottom:.75rem">
      <div class="row">
        <button class="btn btn-secondary" onclick="scPrev()">← Prev</button>
        <span class="badge" style="font-size:1.05rem;padding:.5rem 1rem">Word ${state.scIdx+1} / ${state.words.length}</span>
        <button class="btn btn-secondary" onclick="scNext()">Next →</button>
      </div>
      <button class="btn btn-secondary" onclick="scReshuffle()">🔄 Reshuffle</button>
    </div>
    <div class="card" style="text-align:center;padding:1.5rem 1rem">
      <div style="color:#64748b;margin-bottom:.4rem;font-size:.9rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600">Hint</div>
      ${w.ipa?`<div class="ipa-hint">${escapeHtml(w.ipa)}</div>`:''}
      <div style="font-size:clamp(1.4rem,2.6vw,1.8rem);font-weight:500;margin-bottom:.4rem;color:#0f172a">${escapeHtml(w.meaning||'(no meaning)')}</div>
      ${w.translation?`<div style="color:#7c3aed;font-style:italic;font-size:1.2rem;margin-bottom:.5rem">🇻🇳 ${escapeHtml(w.translation)}</div>`:''}
      <div class="scramble-slots">
        ${w.word.split('').map((_,i)=>{
          const filled = state.scAnswer[i];
          let cls = 'scramble-slot';
          if(filled) cls += ' filled';
          if(state.scResult==='correct') cls += ' correct';
          else if(state.scResult==='wrong' && filled) cls += ' wrong';
          return `<div class="${cls}" onclick="scRemove(${i})">${filled?escapeHtml(filled.ch):''}</div>`;
        }).join('')}
      </div>
      <div class="scramble-tiles">
        ${state.scTiles.map(t=>`
          <button class="scramble-tile" onclick="scPlace(${t.id})" ${t.used?'disabled':''}>${escapeHtml(t.ch)}</button>
        `).join('')}
      </div>
      <div class="row" style="justify-content:center;margin-top:1.25rem;gap:.6rem">
        <button class="btn btn-secondary" onclick="scClear()">Clear</button>
        <button class="btn btn-primary btn-lg" onclick="scCheck()">Check</button>
      </div>
      ${state.scResult==='correct'?`<div style="color:#10b981;font-weight:700;font-size:1.5rem;margin-top:.85rem">✅ Correct! It's "${escapeHtml(w.word)}"</div>`:''}
      ${state.scResult==='wrong'?`<div style="color:#ef4444;font-weight:700;font-size:1.3rem;margin-top:.85rem">❌ Not quite — try again!</div>`:''}
    </div>
  `;
}
function scPlace(id){
  const tile = state.scTiles.find(t=>t.id===id);
  if(!tile||tile.used) return;
  tile.used = true;
  state.scAnswer.push({...tile});
  state.scResult = null; sound.place(); render();
}
function scRemove(i){
  const filled = state.scAnswer[i];
  if(!filled) return;
  state.scAnswer.splice(i,1);
  const t = state.scTiles.find(t=>t.id===filled.id);
  if(t) t.used = false;
  state.scResult = null; sound.pop(); render();
}
function scClear(){
  sound.softClick();
  state.scTiles.forEach(t=>t.used=false);
  state.scAnswer = []; state.scResult = null; render();
}
function scCheck(){
  const w = state.words[state.scIdx];
  const guess = state.scAnswer.map(a=>a.ch).join('');
  if(guess.toLowerCase()===w.word.toLowerCase()){ state.scResult='correct'; sound.correct(); }
  else { state.scResult='wrong'; sound.wrong(); }
  render();
}
function scNext(){ sound.softClick(); state.scIdx=(state.scIdx+1)%state.words.length; initScramble(); render(); }
function scPrev(){ sound.softClick(); state.scIdx=(state.scIdx-1+state.words.length)%state.words.length; initScramble(); render(); }
function scReshuffle(){ sound.shuffle(); initScramble(); render(); }

        <line x1="200" y1="167" x2="200" y2="193" stroke="#94a3b8" stroke-width="1.5"/>
        <line x1="187" y1="180" x2="213" y2="180" stroke="#94a3b8" stroke-width="1.5"/>
        <line x1="190" y1="170" x2="210" y2="190" stroke="#94a3b8" stroke-width="1"/>
        <line x1="190" y1="190" x2="210" y2="170" stroke="#94a3b8" stroke-width="1"/>
        <circle cx="200" cy="180" r="5" fill="#cbd5e1"/>
      </g>
      ${left===0?`<text x="140" y="225" text-anchor="middle" font-size="13" fill="#94a3b8" font-style="italic">all boxes fell off!</text>`:''}
    </svg>
  `;
}

function svgMai(wrong){
  const left = 6 - wrong;
  const blossoms = [
    {cx:75,cy:65,d:0},{cx:130,cy:45,d:.4},{cx:175,cy:70,d:.8},
    {cx:60,cy:115,d:1.2},{cx:120,cy:100,d:1.6},{cx:185,cy:115,d:2.0},

    <g style="transform-origin:${cx}px ${cy}px;animation:svgPetalBreathe 2.5s ease-in-out infinite;animation-delay:${delay}s">
      ${[0,1,2,3,4].map(i=>{
        const a = (i*72-90)*Math.PI/180;
        const px = cx + Math.cos(a)*7, py = cy + Math.sin(a)*7;

    <svg viewBox="0 0 240 230" class="scene-svg">

        <linearGradient id="maiPot" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#991b1b"/></linearGradient>
        <linearGradient id="maiBranch" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#92400e"/><stop offset="100%" stop-color="#451a03"/></linearGradient>

      <ellipse cx="127" cy="218" rx="60" ry="6" fill="#000" opacity=".15"/>
      <path d="M 88 180 L 96 215 L 158 215 L 166 180 Z" fill="url(#maiPot)" stroke="#7f1d1d" stroke-width="2"/>
      <rect x="84" y="174" width="86" height="13" fill="#fbbf24" stroke="#92400e" stroke-width="1.5" rx="2"/>
      <rect x="86" y="176" width="82" height="3" fill="#fde68a" rx="1"/>
      <text x="127" y="184" text-anchor="middle" font-size="9" fill="#7f1d1d" font-weight="bold">TẾT</text>
      <g style="transform-origin:127px 180px;animation:svgSway 5s ease-in-out infinite">
        <path d="M 127 180 L 122 130 L 122 75" stroke="url(#maiBranch)" stroke-width="6" fill="none" stroke-linecap="round"/>

        <path d="M 122 75 L 85 55 L 70 60" stroke="url(#maiBranch)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 122 75 L 165 55 L 180 65" stroke="url(#maiBranch)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 122 95 L 105 80" stroke="url(#maiBranch)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M 122 115 L 145 105" stroke="url(#maiBranch)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        ${blossoms.slice(0, left).map(b => flower(b.cx, b.cy, b.d)).join('')}

          <circle cx="55" cy="110" r="3" fill="#16a34a"/>
          <circle cx="190" cy="110" r="3" fill="#16a34a"/>

          <circle cx="180" cy="65" r="2.5" fill="#16a34a"/>

      </g>
      ${left===0?`<text x="120" y="155" text-anchor="middle" font-size="13" fill="#94a3b8" font-style="italic">no blossoms for Tết...</text>`:''}
      ${left>=4?`
        <ellipse cx="30" cy="40" rx="4" ry="3" fill="#fde047" opacity=".8" transform="rotate(20 30 40)">
          <animateTransform attributeName="transform" type="translate" values="0 0;15 180;0 0" dur="8s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".8;0;.8" dur="8s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="220" cy="50" rx="4" ry="3" fill="#facc15" opacity=".8" transform="rotate(-30 220 50)">
          <animateTransform attributeName="transform" type="translate" values="0 0;-10 170;0 0" dur="9s" begin="3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".8;0;.8" dur="9s" begin="3s" repeatCount="indefinite"/>

}

const SCENES = [
  { id:'lotus', emoji:'🪷', title:'Save the Lotus', desc:'Each wrong guess, a petal falls.', svg:svgLotus, hitEmoji:'🌸', missEmoji:'🍃', win:'🌸 You saved the lotus!', lose:'The lotus wilted.' },
  { id:'pho', emoji:'🍜', title:'Save the Phở', desc:'Save the toppings before it gets cold!', svg:svgPho, hitEmoji:'♨️', missEmoji:'❄️', win:'🍜 Hot phở rescued!', lose:'The phở got cold &amp; empty…' },
  { id:'banhmi', emoji:'🥖', title:'Save the Bánh Mì', desc:'Catch the fillings before they fall!', svg:svgBanhMi, hitEmoji:'🥬', missEmoji:'💨', win:'🥖 Bánh mì preserved!', lose:'All the filling fell out!' },
  { id:'coffee', emoji:'☕', title:'Save the Cà Phê Sữa Đá', desc:'Hurry — the ice is melting!', svg:svgCoffee, hitEmoji:'🧊', missEmoji:'💧', win:'☕ Iced coffee saved on time!', lose:'All ice melted!' },
  { id:'banhchung', emoji:'🎋', title:'Save the Bánh Chưng', desc:'Guess before the strings untie!', svg:svgBanhChung, hitEmoji:'🎋', missEmoji:'🪢', win:'🎋 Tết is saved!', lose:'Bánh chưng came unwrapped!' },
  { id:'motorbike', emoji:'🛵', title:'Save the Delivery', desc:'Keep the boxes on the xe máy!', svg:svgMotorbike, hitEmoji:'📦', missEmoji:'💥', win:'🛵 Delivery successful!', lose:'All boxes fell off!' },
  { id:'mai', emoji:'🌼', title:'Save the Cây Mai', desc:'Make Cây Mai bloom for Tết!', svg:svgMai, hitEmoji:'🌼', missEmoji:'🍂', win:'🌼 Mai bloomed in time for Tết!', lose:'The mai tree has no blossoms…' },
];

function pickScene(){
  const others = SCENES.filter(s => s.id !== state.lotusLastSceneId);
  const pool = others.length ? others : SCENES;
  return pool[Math.floor(Math.random()*pool.length)];
}

function pickWord(){
  let unused = state.words.filter(w => !state.lotusUsedWords.has(w.id));
  if(!unused.length){
    // all words played — reset cycle, but still avoid the very last one if possible
    state.lotusUsedWords = new Set();
    const last = state.lotusWord ? state.lotusWord.id : null;
    unused = state.words.filter(w => w.id !== last);
    if(!unused.length) unused = state.words;
  }
  return unused[Math.floor(Math.random()*unused.length)];
}

function initLotus(){
  if(!state.words.length){ state.lotusWord=null; return; }
  state.lotusWord = pickWord();
  state.lotusUsedWords.add(state.lotusWord.id);
  state.lotusScene = pickScene();
  state.lotusLastSceneId = state.lotusScene.id;
  state.lotusGuessed = new Set();
  state.lotusWrong = 0;
  state.lotusEnded = false;
}

function spawnBurst(emoji, count, isHit){
  const wrap = document.querySelector('.scene-wrap');
  if(!wrap) return;
  const rect = wrap.getBoundingClientRect();
  for(let i=0;i<count;i++){
    const el = document.createElement('div');
    el.className = 'burst';
    el.textContent = emoji;
    const angle = (Math.random()-0.5) * (isHit ? Math.PI : Math.PI*0.5);
    const dist = 60 + Math.random()*60;
    const bx = Math.sin(angle) * dist;
    const by = isHit ? -(40 + Math.random()*60) : (40 + Math.random()*60);
    el.style.setProperty('--bx', bx+'px');
    el.style.setProperty('--by', by+'px');
    el.style.left = (rect.width/2 + (Math.random()-0.5)*40) + 'px';
    el.style.top = (rect.height/2 + (Math.random()-0.5)*40) + 'px';
    el.style.animationDelay = (Math.random()*0.15) + 's';
    wrap.appendChild(el);
    setTimeout(()=>el.remove(), 1300);
  }
}

function renderLotus(app){
  if(!state.lotusWord || !state.lotusScene){ app.innerHTML = `<div class="empty">Add words first.</div>`; return; }
  const w = state.lotusWord;
  const sc = state.lotusScene;
  const display = w.word.split('').map(ch => /[a-z]/i.test(ch) ? (state.lotusGuessed.has(ch.toLowerCase())?ch:'_') : ch);
  const won = !display.includes('_');
  const lost = state.lotusWrong >= state.lotusMax;
  const done = won||lost;
  const letters = 'abcdefghijklmnopqrstuvwxyz'.split('');
  const livesLeft = Math.max(0, state.lotusMax - state.lotusWrong);

  let livesPips = '';
  for(let i=0;i<state.lotusMax;i++){
    livesPips += `<span class="lives-pip ${i>=livesLeft?'lost':''}"></span>`;
  }

  app.innerHTML = `
    <div class="row-between" style="margin-bottom:.6rem">
      <div style="font-size:.9rem;color:#64748b">${state.lotusUsedWords.size} / ${state.words.length} words this round</div>
      <button class="btn btn-secondary" onclick="lotusNew()">🔄 Skip · new word</button>
    </div>
    <div class="lotus-stage">
      <div class="lotus-left">
        <div class="scene-wrap">
          ${sc.svg(state.lotusWrong)}
        </div>
      </div>
      <div class="lotus-right">
        <div class="lotus-header">
          <div class="lotus-scene-title">${sc.emoji} ${sc.title}</div>
          <div class="lotus-lives">
            <span style="color:#64748b">Lives:</span>
            <span class="lives-pips">${livesPips}</span>
            <span style="color:#475569">${livesLeft}/${state.lotusMax}</span>
          </div>
        </div>

        <div class="lotus-word">
          ${display.map(ch=>`<span class="lotus-letter ${ch!=='_'?'revealed':''}">${ch===' '?'&nbsp;':escapeHtml(ch)}</span>`).join('')}
        </div>

        <div class="lotus-meaning">
          ${escapeHtml(w.meaning||'(no meaning)')}
        </div>
        <div class="lotus-meta">
          ${w.translation?`<span class="vn">🇻🇳 ${escapeHtml(w.translation)}</span>`:''}
          ${w.ipa?`<span class="ipa">${escapeHtml(w.ipa)}</span>`:''}
          <span class="len">${w.word.length} letters</span>
        </div>

        ${done ? `
          <div class="lotus-end ${won?'win':'lose'}">
            ${won
              ? `<div style="font-size:clamp(1.3rem,2.4vw,1.7rem);color:#10b981;font-weight:800">${sc.win}</div>`
              : `<div style="font-size:clamp(1.2rem,2.2vw,1.5rem);color:#ef4444;font-weight:700">${sc.lose}<br><span style="font-size:.85em;color:#475569;font-weight:600">The word was <b>${escapeHtml(w.word)}</b></span></div>`}
            <button class="btn btn-primary btn-lg" style="margin-top:.7rem" onclick="lotusNew()">▶ Next word + new scene</button>
          </div>
        ` : `
          <div class="lotus-keys">
            ${letters.map(L=>{
              const guessed = state.lotusGuessed.has(L);
              const inWord = w.word.toLowerCase().includes(L);
              const cls = guessed ? (inWord?'hit':'miss') : '';
              return `<button class="lotus-key ${cls}" onclick="lotusGuess('${L}')" ${guessed?'disabled':''}>${L.toUpperCase()}</button>`;
            }).join('')}
          </div>
        `}
      </div>
    </div>
  `;

  if(done){
    const svg = document.querySelector('.scene-svg');
    if(svg){ svg.classList.add(won?'win':'lose'); }
    if(won){
      setTimeout(()=>{
        const stage = document.querySelector('.lotus-stage');
        if(stage) spawnSparkles(stage);
      }, 100);
    }
  }
}

function lotusNew(){ sound.shuffle(); initLotus(); render(); }

function lotusGuess(letter){
  const w = state.lotusWord;
  const sc = state.lotusScene;
  if(!w || state.lotusGuessed.has(letter) || state.lotusEnded) return;
  state.lotusGuessed.add(letter);
  const inWord = w.word.toLowerCase().includes(letter);
  if(inWord){ sound.petalSave(); }
  else { state.lotusWrong++; sound.petalFall(); }
  const display = w.word.split('').map(ch => /[a-z]/i.test(ch) ? (state.lotusGuessed.has(ch.toLowerCase())?ch:'_') : ch);
  const won = !display.includes('_');
  const lost = state.lotusWrong >= state.lotusMax;
  if((won||lost) && !state.lotusEnded){
    state.lotusEnded = true;
    setTimeout(()=>{ won ? sound.fanfare() : sound.sad(); }, 400);
  }
  render();

  requestAnimationFrame(()=>{
    const svg = document.querySelector('.scene-svg');
    if(svg && !state.lotusEnded){
      const cls = inWord ? 'pulse' : 'shake';
      svg.classList.add(cls);
      setTimeout(()=>svg.classList.remove(cls), 600);
    }
    spawnBurst(inWord ? sc.hitEmoji : sc.missEmoji, inWord ? 5 : 3, inWord);
  });
}

document.addEventListener('keydown', e=>{
  if(state.view!=='lotus') return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const k = e.key.toLowerCase();
  if(/^[a-z]$/.test(k)) lotusGuess(k);
});

render();
</script>
