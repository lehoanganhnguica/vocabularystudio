<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Studio — Classroom Vocabulary Teaching Tool</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;line-height:1.5}
  header{background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);color:white;padding:1rem 1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.1)}
  .header-inner{max-width:1200px;margin:0 auto;display:flex;flex-wrap:wrap;gap:1rem;align-items:center;justify-content:space-between}
  h1{font-size:1.4rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
  .header-right{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
  nav{display:flex;flex-wrap:wrap;gap:.25rem;background:rgba(255,255,255,.15);padding:.25rem;border-radius:.5rem}
  nav button{background:transparent;border:none;color:white;padding:.4rem .75rem;border-radius:.4rem;cursor:pointer;font-size:.85rem;font-weight:500;transition:background .15s}
  nav button:hover{background:rgba(255,255,255,.2)}
  nav button.active{background:white;color:#4f46e5}
  .sound-toggle{background:rgba(255,255,255,.15);border:none;color:white;padding:.5rem .7rem;border-radius:.4rem;cursor:pointer;font-size:1rem;transition:background .15s}
  .sound-toggle:hover{background:rgba(255,255,255,.25)}
  main{max-width:1200px;margin:0 auto;padding:1.5rem}
  .card{background:white;border-radius:.75rem;padding:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e2e8f0}
  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1rem;border-radius:.5rem;font-size:.9rem;font-weight:500;border:none;cursor:pointer;transition:all .15s}
  .btn-primary{background:#4f46e5;color:white}
  .btn-primary:hover{background:#4338ca}
  .btn-primary:disabled{background:#cbd5e1;cursor:not-allowed}
  .btn-secondary{background:#e2e8f0;color:#334155}
  .btn-secondary:hover{background:#cbd5e1}
  .btn-success{background:#10b981;color:white}
  .btn-success:hover{background:#059669}
  .btn-danger{background:#ef4444;color:white}
  .btn-danger:hover{background:#dc2626}
  .btn-ghost{background:transparent;color:#64748b}
  .btn-ghost:hover{background:#f1f5f9}
  .row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
  .row-between{display:flex;gap:.5rem;align-items:center;justify-content:space-between;flex-wrap:wrap}
  textarea,input[type=text]{width:100%;border:1px solid #cbd5e1;border-radius:.5rem;padding:.6rem .8rem;font-size:.9rem;font-family:inherit}
  textarea:focus,input:focus{outline:2px solid #4f46e5;outline-offset:-1px;border-color:transparent}
  textarea{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.8rem}
  .empty{text-align:center;padding:3rem 1rem;color:#64748b;border:2px dashed #cbd5e1;border-radius:.75rem;background:white}
  .grid{display:grid;gap:.75rem;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .word-card{background:white;border:1px solid #e2e8f0;border-radius:.75rem;padding:1rem;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .word-card h3{color:#4f46e5;font-size:1.1rem;margin-bottom:.1rem}
  .word-card .ipa{color:#0891b2;font-family:ui-monospace,monospace;font-size:.85rem;margin-bottom:.25rem}
  .word-card .vn{color:#64748b;font-style:italic;font-size:.8rem}
  .word-card .meaning{font-size:.85rem;color:#475569;margin:.4rem 0}
  .word-card .ex{font-size:.85rem;color:#64748b;border-left:3px solid #c7d2fe;padding-left:.6rem;margin-top:.4rem}
  .hl{background:#fde68a;color:#92400e;padding:0 3px;border-radius:3px;font-weight:600}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:1rem;z-index:50}
  .modal{background:white;border-radius:.75rem;padding:1.5rem;max-width:52rem;width:100%;max-height:92vh;overflow:auto}
  .hidden{display:none!important}
  .toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);padding:.6rem 1.2rem;border-radius:.5rem;color:white;z-index:60;font-size:.9rem;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.15)}
  .toast.success{background:#10b981}
  .toast.error{background:#ef4444}
  .toast.info{background:#3b82f6}

  .tabs{display:flex;gap:.25rem;border-bottom:2px solid #e2e8f0;margin-bottom:1.25rem}
  .tab{background:transparent;border:none;padding:.6rem 1rem;cursor:pointer;font-size:.9rem;font-weight:600;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit}
  .tab:hover{color:#4f46e5}
  .tab.active{color:#4f46e5;border-bottom-color:#4f46e5}
  .step{background:#eef2ff;border-left:4px solid #4f46e5;padding:.85rem 1rem;border-radius:.4rem;margin-bottom:.75rem;font-size:.9rem;line-height:1.6}
  .step b{color:#4f46e5}
  .step-num{display:inline-flex;align-items:center;justify-content:center;width:1.5rem;height:1.5rem;background:#4f46e5;color:white;border-radius:50%;font-size:.8rem;font-weight:700;margin-right:.4rem}
  .prompt-box{background:#0f172a;color:#e2e8f0;border-radius:.5rem;padding:1rem 1.1rem;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.82rem;line-height:1.65;white-space:pre-wrap;word-break:break-word;max-height:24rem;overflow-y:auto;border:1px solid #334155}
  .prompt-box .ph{color:#fbbf24;font-weight:700;background:rgba(251,191,36,.15);padding:1px 4px;border-radius:3px}
  .prompt-box .cmt{color:#94a3b8;font-style:italic}
  .info-banner{background:#fef3c7;border:1px solid #f59e0b;color:#92400e;padding:.7rem .9rem;border-radius:.5rem;font-size:.85rem;margin-bottom:1rem;line-height:1.5}

  .teach-stage{background:white;border-radius:1rem;padding:3rem 2rem;text-align:center;min-height:55vh;display:flex;flex-direction:column;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.05);position:relative;overflow:hidden}
  .teach-word{font-size:clamp(2.5rem,8vw,5rem);font-weight:800;color:#4f46e5;margin-bottom:.5rem;letter-spacing:-.02em;line-height:1}
  .teach-ipa{font-family:ui-monospace,Menlo,monospace;font-size:clamp(1.1rem,3vw,1.6rem);color:#0891b2;margin-bottom:1.5rem}
  .teach-example{font-size:clamp(1.1rem,3vw,1.5rem);color:#475569;font-style:italic;max-width:46rem;margin:0 auto 1.5rem;line-height:1.6}
  .teach-meaning{font-size:clamp(1.1rem,2.5vw,1.4rem);color:#0f172a;font-weight:500;margin-bottom:.5rem;padding-top:1rem;border-top:1px dashed #cbd5e1;animation:fadeIn .5s}
  .teach-vn{font-size:clamp(1rem,2vw,1.2rem);color:#7c3aed;font-style:italic;animation:fadeIn .8s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .progress{background:#e2e8f0;border-radius:99px;height:6px;overflow:hidden;margin-bottom:1rem}
  .progress-bar{background:linear-gradient(90deg,#4f46e5,#7c3aed);height:100%;transition:width .3s}
  .sparkle{position:absolute;pointer-events:none;font-size:1.5rem;animation:sparkleAnim 1s ease-out forwards}
  @keyframes sparkleAnim{0%{opacity:0;transform:scale(0)}30%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(.5) translateY(-30px)}}

  .quiz-q{font-size:clamp(1.2rem,3vw,1.6rem);margin-bottom:2rem;text-align:center;color:#0f172a;font-weight:500;line-height:1.5;padding:0 .5rem}
  .quiz-options{display:grid;gap:.85rem;max-width:42rem;margin:0 auto}
  .quiz-opt{padding:1.1rem 1.4rem;border:2px solid #e2e8f0;border-radius:.7rem;background:white;cursor:pointer;text-align:left;font-size:1.1rem;font-weight:500;transition:all .15s;font-family:inherit;line-height:1.4}
  .quiz-opt:hover:not(:disabled){border-color:#a5b4fc;background:#eef2ff;transform:translateY(-1px)}
  .quiz-opt.correct{border-color:#10b981;background:#d1fae5;color:#065f46}
  .quiz-opt.wrong{border-color:#ef4444;background:#fee2e2;color:#991b1b}
  .quiz-opt:disabled{cursor:default}
  .quiz-ipa-mode{font-family:ui-monospace,monospace}

  .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;max-width:52rem;margin:0 auto}
  .match-tile{padding:1.25rem 1rem;border:2px solid #e2e8f0;border-radius:.7rem;background:white;cursor:pointer;font-size:1.05rem;font-weight:500;text-align:center;transition:all .15s;min-height:5.5rem;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1.4}
  .match-tile:hover:not(:disabled){border-color:#a5b4fc;background:#fafbff;transform:translateY(-1px)}
  .match-tile.selected{border-color:#4f46e5;background:#eef2ff;transform:scale(1.02)}
  .match-tile.matched{border-color:#10b981;background:#d1fae5;color:#065f46;cursor:default;opacity:.75}
  .match-tile.flash-wrong{border-color:#ef4444;background:#fee2e2}

  .scramble-slots{display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;margin:1.75rem 0;min-height:4rem}
  .scramble-slot{width:3.75rem;height:4.25rem;border:2px dashed #cbd5e1;border-radius:.5rem;display:flex;align-items:center;justify-content:center;font-size:1.9rem;font-weight:700;color:#4f46e5;background:#f8fafc;text-transform:lowercase}
  .scramble-slot.filled{border-style:solid;border-color:#4f46e5;background:#eef2ff;cursor:pointer}
  .scramble-slot.correct{border-color:#10b981;background:#d1fae5;color:#065f46}
  .scramble-slot.wrong{border-color:#ef4444;background:#fee2e2;color:#991b1b}
  .scramble-tiles{display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;margin-top:1.25rem}
  .scramble-tile{width:3.75rem;height:4.25rem;border:2px solid #4f46e5;background:white;border-radius:.5rem;font-size:1.9rem;font-weight:700;color:#4f46e5;cursor:pointer;transition:all .15s;font-family:inherit}
  .scramble-tile:hover{background:#eef2ff;transform:translateY(-2px)}
  .scramble-tile:disabled{opacity:.3;cursor:default;transform:none}
  .ipa-hint{font-family:ui-monospace,monospace;color:#0891b2;font-size:1.15rem;margin-bottom:.5rem}

  .lotus-stage{display:flex;flex-direction:column;align-items:center;gap:1.25rem}
  .lotus-svg{width:100%;max-width:18rem;height:auto;display:block}
  .lotus-scene-title{font-size:1.5rem;font-weight:700;color:#7c3aed;text-align:center}
  .lotus-word{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;font-family:ui-monospace,monospace;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;color:#4f46e5;letter-spacing:.1em;margin:1rem 0}
  .lotus-letter{min-width:1.7rem;border-bottom:3px solid #4f46e5;text-align:center;padding-bottom:.15rem}
  .lotus-keys{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:.4rem;width:100%;max-width:38rem;margin:1rem auto 0}
  .lotus-key{padding:.85rem 0;border:2px solid #cbd5e1;border-radius:.5rem;background:white;cursor:pointer;font-weight:700;font-size:1.05rem;transition:all .15s;font-family:inherit}
  .lotus-key:hover:not(:disabled){background:#eef2ff;border-color:#4f46e5;transform:translateY(-1px)}
  .lotus-key.hit{background:#d1fae5;border-color:#10b981;color:#065f46}
  .lotus-key.miss{background:#fee2e2;border-color:#ef4444;color:#991b1b}
  .lotus-key:disabled{cursor:default}
  .lotus-hint{font-size:1.1rem;color:#475569;text-align:center;max-width:38rem;line-height:1.6;padding:.75rem 1rem;background:#f8fafc;border-radius:.6rem;border:1px solid #e2e8f0}
  .lotus-hint b{color:#0f172a}

  .badge{display:inline-flex;align-items:center;gap:.3rem;padding:.4rem .8rem;border-radius:99px;background:#eef2ff;color:#4f46e5;font-size:.9rem;font-weight:600}

  .footer{text-align:center;color:#94a3b8;font-size:.8rem;padding:1.5rem 1rem 2rem;line-height:1.7}
  .footer .contact{margin-top:.5rem;color:#64748b}
  .footer a{color:#4f46e5;text-decoration:none;font-weight:500}
  .footer a:hover{text-decoration:underline}

  @media (max-width:640px){
    .lotus-keys{grid-template-columns:repeat(6,minmax(0,1fr))}
    .match-grid{grid-template-columns:1fr}
    .teach-stage{padding:2rem 1rem}
    .scramble-slot,.scramble-tile{width:3rem;height:3.5rem;font-size:1.5rem}
    .modal{padding:1rem}
    .tab{padding:.5rem .6rem;font-size:.8rem}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>📚 Vocab Studio</h1>
    <div class="header-right">
      <nav id="nav">
        <button data-view="library" class="active">📖 Library</button>
        <button data-view="flashcards">🃏 Flashcards</button>
        <button data-view="quiz">❓ Quiz</button>
        <button data-view="match">🔗 Match</button>
        <button data-view="scramble">🔤 Scramble</button>
        <button data-view="lotus">🛟 Save the Day</button>
      </nav>
      <button id="sound-toggle" class="sound-toggle" title="Toggle sound">🔊</button>
    </div>
  </div>
</header>

<main id="app"></main>

<div id="modal-root"></div>

<script>
const sound = {
  enabled: true, ctx: null, master: null,
  init(){
    if(!this.ctx){
      try{
        const AC = window.AudioContext || window.webkitAudioContext;
        if(!AC) return;
        this.ctx = new AC();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.7;
        this.master.connect(this.ctx.destination);
      }catch(e){ this.enabled = false; }
    }
    if(this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  tone(freq, dur, opts={}){
    if(!this.enabled || !this.ctx) return;
    const { type='sine', vol=0.15, when=0, attack=0.005 } = opts;
    const t0 = this.ctx.currentTime + when;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(this.master);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
  },
  sweep(f1, f2, dur, opts={}){
    if(!this.enabled || !this.ctx) return;
    const { type='sine', vol=0.15, when=0 } = opts;
    const t0 = this.ctx.currentTime + when;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f1, t0);
    osc.frequency.exponentialRampToValueAtTime(Math.max(f2,1), t0 + dur);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(this.master);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
  },
  noise(dur, opts={}){
    if(!this.enabled || !this.ctx) return;
    const { vol=0.08, when=0, freq=2000, q=5 } = opts;
    const t0 = this.ctx.currentTime + when;
    const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i] = Math.random()*2-1;
    const src = this.ctx.createBufferSource(); src.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = freq; filter.Q.value = q;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(filter).connect(gain).connect(this.master);
    src.start(t0); src.stop(t0 + dur);
  },
  click(){ this.tone(900, 0.04, {type:'square', vol:0.06}); },
  softClick(){ this.tone(600, 0.03, {type:'triangle', vol:0.05}); },
  pop(){ this.sweep(700, 250, 0.08, {type:'sine', vol:0.1}); },
  tap(){ this.tone(750, 0.05, {type:'triangle', vol:0.08}); this.tone(1500, 0.03, {type:'sine', vol:0.04, when:0.005}); },
  select(){ this.tone(523, 0.06, {type:'triangle', vol:0.08}); this.tone(784, 0.06, {type:'sine', vol:0.05, when:0.03}); },
  magic(){
    const notes = [523.25, 659.25, 783.99, 1046.5, 1318.5];
    notes.forEach((f,i)=>this.tone(f, 0.5, {type:'sine', vol:0.1, when:i*0.07}));
    [2093, 2637, 3136].forEach((f,i)=>this.tone(f, 0.3, {type:'sine', vol:0.04, when:0.35+i*0.05}));
    this.noise(0.4, {vol:0.03, when:0.3, freq:6000, q:8});
  },
  shuffle(){ for(let i=0;i<8;i++) this.tone(200 + Math.random()*600, 0.03, {type:'square', vol:0.05, when:i*0.04}); },
  correct(){
    this.tone(523.25, 0.12, {type:'sine', vol:0.13});
    this.tone(659.25, 0.12, {type:'sine', vol:0.13, when:0.1});
    this.tone(783.99, 0.3, {type:'sine', vol:0.13, when:0.2});
    this.tone(1046.5, 0.3, {type:'sine', vol:0.08, when:0.2});
  },
  wrong(){
    this.tone(220, 0.15, {type:'sawtooth', vol:0.08});
    this.tone(180, 0.2, {type:'sawtooth', vol:0.08, when:0.12});
  },
  ding(){
    this.tone(880, 0.4, {type:'sine', vol:0.12});
    this.tone(1318, 0.4, {type:'sine', vol:0.07, when:0.01});
    this.tone(1760, 0.3, {type:'sine', vol:0.04, when:0.02});
  },
  fanfare(){
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((f,i)=>this.tone(f, 0.2, {type:'triangle', vol:0.13, when:i*0.1}));
    this.tone(1046.5, 0.7, {type:'sine', vol:0.12, when:0.45});
    this.tone(1318.5, 0.7, {type:'sine', vol:0.1, when:0.45});
    this.tone(1568, 0.7, {type:'sine', vol:0.08, when:0.45});
  },
  petalFall(){
    this.sweep(600, 150, 0.4, {type:'sine', vol:0.1});
    this.tone(200, 0.15, {type:'triangle', vol:0.06, when:0.35});
  },
  sad(){
    const notes = [392, 349.23, 311.13, 261.63];
    notes.forEach((f,i)=>this.tone(f, 0.35, {type:'triangle', vol:0.11, when:i*0.18}));
  },
  place(){
    this.tone(440, 0.05, {type:'triangle', vol:0.08});
    this.tone(880, 0.03, {type:'sine', vol:0.05, when:0.02});
  },
  petalSave(){
    this.tone(659.25, 0.15, {type:'sine', vol:0.12});
    this.tone(987.77, 0.25, {type:'sine', vol:0.08, when:0.08});
  },
};
function unlockAudio(){
  sound.init();
  document.removeEventListener('click', unlockAudio);
  document.removeEventListener('keydown', unlockAudio);
  document.removeEventListener('touchstart', unlockAudio);
}
document.addEventListener('click', unlockAudio);
document.addEventListener('keydown', unlockAudio);
document.addEventListener('touchstart', unlockAudio);

try{ const saved = localStorage.getItem('vocab-studio-sound'); if(saved==='off') sound.enabled=false; }catch(e){}
const soundBtn = document.getElementById('sound-toggle');
function updateSoundBtn(){ soundBtn.textContent = sound.enabled ? '🔊' : '🔇'; }
updateSoundBtn();
soundBtn.addEventListener('click', ()=>{
  sound.enabled = !sound.enabled;
  try{ localStorage.setItem('vocab-studio-sound', sound.enabled?'on':'off'); }catch(e){}
  updateSoundBtn();
  if(sound.enabled){ sound.init(); sound.ding(); }
});

const state = {
  words: [],
  view: 'library',
  fcIdx: 0, fcRevealed: false,
  quizQ: null, quizScore: 0, quizTotal: 0,
  matchPairs: [], matchSelected: null, matchMatched: new Set(), matchMoves: 0,
  scIdx: 0, scTiles: [], scAnswer: [], scResult: null,
  lotusWord: null, lotusScene: null, lotusGuessed: new Set(), lotusWrong: 0, lotusMax: 6, lotusEnded: false,
  importTab: 'guide',
};

const SAMPLE = [
  {word:'academic',ipa:'/ˌækəˈdemɪk/',meaning:'good at or interested in studying',translation:'thích học / học thuật',example:'She enjoys reading and studying, so she is very academic.'},
  {word:'ambitious',ipa:'/æmˈbɪʃəs/',meaning:'wanting to be successful',translation:'có tham vọng',example:'He wants to become a doctor, so he is very ambitious.'},

const escapeHtml = s => (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const sample = (arr,n) => shuffle(arr).slice(0,n);

function highlight(sentence, word){
  if(!sentence||!word) return escapeHtml(sentence);
  const safe = escapeHtml(sentence);
  const re = new RegExp('\\b('+word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\w*)\\b','gi');
  return safe.replace(re,'<span class="hl">$1</span>');
}

function toast(msg, type='info'){

function spawnSparkles(container){

function stripMd(s){
  return (s||'')
    .replace(/\*\*(.+?)\*\*/g,'$1').replace(/__(.+?)__/g,'$1')
    .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'$1')
    .replace(/`(.+?)`/g,'$1').trim();
}
function looksLikeIPA(s){
  if(!s) return false;
  if(/^[\/\[].*[\/\]]$/.test(s.trim())) return true;
  return /[ˈˌəɪʊɔɛæʃʒθðŋːɑɒɜɝɚʌɐ]/.test(s);
}
function parseTable(text){
  let lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(!lines.length) return [];
  lines = lines.filter(l => !/^\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)*\|?\s*$/.test(l));
  if(!lines.length) return [];
  const pipeLines = lines.filter(l=>l.includes('|')).length;
  const tabLines = lines.filter(l=>l.includes('\t')).length;
  let rows;
  if(pipeLines >= Math.max(2, Math.floor(lines.length*0.6))){
    rows = lines.map(l => l.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim()));
  } else if(tabLines >= 1){
    rows = lines.map(l => l.split('\t').map(c=>c.trim()));
  } else {
    rows = lines.map(l => l.split(/\s{2,}/).map(c=>c.trim()));
  }
  rows = rows.map(r => r.map(stripMd)).filter(r => r.some(c => c.length));
  if(!rows.length) return [];
  const hints = ['word','ipa','pronunciation','phonetic','meaning','definition','vietnamese','translation','vn','cue','example','sentence','simple'];
  const first = rows[0].map(c=>c.toLowerCase());
  const hasHeader = first.some(c => hints.some(h => c.includes(h)));
  const headers = hasHeader ? first : null;
  const data = hasHeader ? rows.slice(1) : rows;
  const idx = { word:0, ipa:-1, meaning:-1, translation:-1, example:-1 };
  if(headers){
    headers.forEach((h,i)=>{
      if(/ipa|pronunc|phonetic/.test(h)) idx.ipa = i;
      else if(/word|term|vocab/.test(h) && !/sentence/.test(h)) idx.word = i;
      else if(/meaning|definition|simple/.test(h)) idx.meaning = i;
      else if(/vietnamese|translation|cue|tiếng|^vn$/i.test(h)) idx.translation = i;
      else if(/example|sentence|context/.test(h)) idx.example = i;
    });
  } else {
    const sampleRow = data[0] || [];
    let ipaCol = -1;
    sampleRow.forEach((c,i)=>{ if(i!==0 && ipaCol===-1 && looksLikeIPA(c)) ipaCol = i; });
    if(ipaCol !== -1){
      idx.ipa = ipaCol;
      const rest = sampleRow.map((_,i)=>i).filter(i=>i!==0 && i!==ipaCol);
      idx.meaning = rest[0] ?? -1;
      idx.translation = rest[1] ?? -1;
      idx.example = rest[2] ?? -1;
    } else {
      idx.meaning = 1; idx.translation = 2;
      idx.example = sampleRow.length >= 4 ? 3 : -1;
    }
  }
  return data.map(r => ({
    id: uid(),
    word: (r[idx.word]||'').trim(),
    ipa: idx.ipa>=0 ? (r[idx.ipa]||'').trim() : '',
    meaning: idx.meaning>=0 ? (r[idx.meaning]||'').trim() : '',
    translation: idx.translation>=0 ? (r[idx.translation]||'').trim() : '',
    example: idx.example>=0 ? (r[idx.example]||'').trim() : ''
  })).filter(w => w.word);
}

function nextQuizQuestion(){
  if(state.words.length<2){ state.quizQ=null; return; }
  const correctIdx = Math.floor(Math.random()*state.words.length);
  const correct = state.words[correctIdx];
  const distractors = sample(state.words.filter((_,i)=>i!==correctIdx), Math.min(3, state.words.length-1));
  const opts = shuffle([correct, ...distractors]);
  const modes = ['meaning'];
  if(correct.example) modes.push('sentence');
  if(correct.ipa && state.words.filter(w=>w.ipa).length>=2) modes.push('ipa');
  const mode = modes[Math.floor(Math.random()*modes.length)];
  state.quizQ = { correct, opts, mode, answered:false, picked:null };
}
function renderQuiz(app){
  if(!state.quizQ){ app.innerHTML = `<div class="empty"><p>Need at least 2 words for the quiz.</p></div>`; return; }
  const q = state.quizQ;
  let prompt;
  if(q.mode==='sentence' && q.correct.example){
    const blanked = q.correct.example.replace(new RegExp('\\b'+q.correct.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\w*\\b','gi'),'_____');
    prompt = `Fill in the blank:<br><span style="font-style:italic;color:#475569;display:inline-block;margin-top:.5rem">"${escapeHtml(blanked)}"</span>`;
  } else if(q.mode==='ipa' && q.correct.ipa){
    prompt = `Which word is pronounced:<br><span class="quiz-ipa-mode" style="color:#0891b2;font-size:1.7rem;display:inline-block;margin-top:.5rem">${escapeHtml(q.correct.ipa)}</span>`;
  } else {
    prompt = `Which word means:<br><b style="display:inline-block;margin-top:.5rem">${escapeHtml(q.correct.meaning||'(no meaning)')}</b>${q.correct.translation?`<br><span style="font-size:1rem;color:#7c3aed;font-style:italic">(${escapeHtml(q.correct.translation)})</span>`:''}`;
  }
  app.innerHTML = `
    <div class="row-between" style="margin-bottom:1.5rem">
      <span class="badge" style="font-size:1rem;padding:.5rem 1rem">Score: ${state.quizScore} / ${state.quizTotal}</span>
      <button class="btn btn-secondary" onclick="quizReset()">🔄 Reset score</button>
    </div>
    <div class="card" style="padding:2rem 1.5rem">
      <div class="quiz-q">${prompt}</div>
      <div class="quiz-options">
        ${q.opts.map(o=>`
          <button class="quiz-opt ${q.answered?(o.id===q.correct.id?'correct':(o.id===q.picked?'wrong':'')):''}"
            ${q.answered?'disabled':''} onclick="quizPick('${o.id}')">
            ${escapeHtml(o.word)}
          </button>
        `).join('')}
      </div>
      ${q.answered?`
        <div style="text-align:center;margin-top:2rem">
          ${q.picked===q.correct.id
            ? `<div style="color:#10b981;font-weight:600;font-size:1.2rem">✅ Correct! <b>${escapeHtml(q.correct.word)}</b>${q.correct.ipa?` <span style="font-family:ui-monospace,monospace;color:#0891b2">${escapeHtml(q.correct.ipa)}</span>`:''}</div>`
            : `<div style="color:#ef4444;font-weight:600;font-size:1.2rem">❌ The answer was <b>${escapeHtml(q.correct.word)}</b>${q.correct.ipa?` <span style="font-family:ui-monospace,monospace;color:#0891b2">${escapeHtml(q.correct.ipa)}</span>`:''}</div>`}
          <button class="btn btn-primary" style="margin-top:1.25rem;font-size:1rem;padding:.7rem 1.5rem" onclick="quizNext()">Next question →</button>
        </div>

}
function quizPick(id){
  const q = state.quizQ;
  q.picked = id; q.answered = true;
  state.quizTotal++;
  if(id===q.correct.id){ state.quizScore++; sound.correct(); } else { sound.wrong(); }
  render();
}
function quizNext(){ sound.softClick(); nextQuizQuestion(); render(); }
function quizReset(){ sound.pop(); state.quizScore=0; state.quizTotal=0; nextQuizQuestion(); render(); }

function initMatch(){
  const pool = sample(state.words, Math.min(6, state.words.length));
  const left = pool.map(w=>({key:w.id+'-w', text:w.word, pairId:w.id, side:'L'}));
  const right = pool.map(w=>({key:w.id+'-m', text:w.meaning||w.translation||'(no meaning)', pairId:w.id, side:'R'}));
  state.matchPairs = shuffle([...left, ...right]);
  state.matchSelected = null; state.matchMatched = new Set(); state.matchMoves = 0;
}
function renderMatch(app){
  const pairs = state.matchPairs;
  const totalPairs = pairs.length/2;
  const matchedCount = state.matchMatched.size/2;
  const done = matchedCount===totalPairs;
  app.innerHTML = `
    <div class="row-between" style="margin-bottom:1rem">
      <div class="row">
        <span class="badge" style="font-size:1rem;padding:.5rem 1rem">Matched: ${matchedCount} / ${totalPairs}</span>
        <span class="badge" style="font-size:1rem;padding:.5rem 1rem">Moves: ${state.matchMoves}</span>
      </div>
      <button class="btn btn-secondary" onclick="matchNew()">🔄 New round</button>
    </div>
    ${done?`<div class="card" style="text-align:center;background:#d1fae5;border-color:#10b981;margin-bottom:1rem">
      <div style="font-size:2rem">🎉</div>
      <div style="font-weight:600;color:#065f46;font-size:1.1rem">Great work! All matched in ${state.matchMoves} moves.</div>
    </div>`:''}
    <p style="text-align:center;color:#475569;font-size:1rem;margin-bottom:1.25rem">Click a word, then click its meaning (or vice versa).</p>
    <div class="match-grid">
      ${pairs.map(p=>{
        const matched = state.matchMatched.has(p.key);
        const selected = state.matchSelected===p.key;
        return `<button class="match-tile ${matched?'matched':''} ${selected?'selected':''}" onclick="matchClick('${p.key}')" ${matched?'disabled':''}>
          ${escapeHtml(p.text)}
        </button>`;
      }).join('')}
    </div>
  `;
}
function matchNew(){ sound.shuffle(); initMatch(); render(); }
function matchClick(key){
  if(state.matchMatched.has(key)) return;
  if(state.matchSelected===key){ sound.softClick(); state.matchSelected=null; render(); return; }
  if(!state.matchSelected){ sound.select(); state.matchSelected = key; render(); return; }
  state.matchMoves++;
  const a = state.matchPairs.find(p=>p.key===state.matchSelected);
  const b = state.matchPairs.find(p=>p.key===key);
  if(a.pairId===b.pairId && a.side!==b.side){
    state.matchMatched.add(a.key); state.matchMatched.add(b.key);
    state.matchSelected = null; sound.ding(); render();
    if(state.matchMatched.size===state.matchPairs.length){ setTimeout(()=>sound.fanfare(), 350); toast('All matched! 🎉','success'); }
  } else {
    sound.wrong();
    const prev = state.matchSelected;
    state.matchSelected = null; render();
    const elA = document.querySelector(`[onclick="matchClick('${prev}')"]`);
    const elB = document.querySelector(`[onclick="matchClick('${key}')"]`);
    elA?.classList.add('flash-wrong'); elB?.classList.add('flash-wrong');
    setTimeout(()=>{ elA?.classList.remove('flash-wrong'); elB?.classList.remove('flash-wrong'); }, 500);
  }
}

function initScramble(){
  const w = state.words[state.scIdx];
  state.scTiles = shuffle(w.word.split('').map((ch,i)=>({ch,id:i,used:false})));
  state.scAnswer = []; state.scResult = null;
}
function renderScramble(app){
  const w = state.words[state.scIdx];
  app.innerHTML = `
    <div class="row-between" style="margin-bottom:1rem">
      <div class="row">
        <button class="btn btn-secondary" onclick="scPrev()">← Prev</button>
        <span class="badge" style="font-size:1rem;padding:.5rem 1rem">Word ${state.scIdx+1} / ${state.words.length}</span>
        <button class="btn btn-secondary" onclick="scNext()">Next →</button>
      </div>
      <button class="btn btn-secondary" onclick="scReshuffle()">🔄 Reshuffle</button>
    </div>
    <div class="card" style="text-align:center;padding:2rem 1.5rem">
      <div style="color:#64748b;margin-bottom:.5rem;font-size:.9rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600">Hint</div>
      ${w.ipa?`<div class="ipa-hint">${escapeHtml(w.ipa)}</div>`:''}
      <div style="font-size:1.25rem;font-weight:500;margin-bottom:.5rem;color:#0f172a">${escapeHtml(w.meaning||'(no meaning)')}</div>
      ${w.translation?`<div style="color:#7c3aed;font-style:italic;font-size:1.05rem;margin-bottom:1rem">🇻🇳 ${escapeHtml(w.translation)}</div>`:''}
      <div class="scramble-slots">
        ${w.word.split('').map((_,i)=>{
          const filled = state.scAnswer[i];
          let cls = 'scramble-slot';
          if(filled) cls += ' filled';
          if(state.scResult==='correct') cls += ' correct';
          else if(state.scResult==='wrong' && filled) cls += ' wrong';
          return `<div class="${cls}" onclick="scRemove(${i})">${filled?escapeHtml(filled.ch):''}</div>`;
        }).join('')}
      </div>
      <div class="scramble-tiles">
        ${state.scTiles.map(t=>`
          <button class="scramble-tile" onclick="scPlace(${t.id})" ${t.used?'disabled':''}>${escapeHtml(t.ch)}</button>
        `).join('')}
      </div>
      <div class="row" style="justify-content:center;margin-top:1.75rem;gap:.6rem">
        <button class="btn btn-secondary" onclick="scClear()">Clear</button>
        <button class="btn btn-primary" style="padding:.7rem 1.5rem;font-size:1rem" onclick="scCheck()">Check</button>
      </div>
      ${state.scResult==='correct'?`<div style="color:#10b981;font-weight:600;font-size:1.2rem;margin-top:1rem">✅ Correct! It's "${escapeHtml(w.word)}"</div>`:''}
      ${state.scResult==='wrong'?`<div style="color:#ef4444;font-weight:600;font-size:1.1rem;margin-top:1rem">❌ Not quite — try again!</div>`:''}
    </div>
  `;
}
function scPlace(id){
  const tile = state.scTiles.find(t=>t.id===id);
  if(!tile||tile.used) return;
  tile.used = true;
  state.scAnswer.push({...tile});
  state.scResult = null; sound.place(); render();
}
function scRemove(i){
  const filled = state.scAnswer[i];
  if(!filled) return;
  state.scAnswer.splice(i,1);
  const t = state.scTiles.find(t=>t.id===filled.id);
  if(t) t.used = false;
  state.scResult = null; sound.pop(); render();
}
function scClear(){
  sound.softClick();
  state.scTiles.forEach(t=>t.used=false);
  state.scAnswer = []; state.scResult = null; render();
}
function scCheck(){
  const w = state.words[state.scIdx];
  const guess = state.scAnswer.map(a=>a.ch).join('');
  if(guess.toLowerCase()===w.word.toLowerCase()){ state.scResult='correct'; sound.correct(); }
  else { state.scResult='wrong'; sound.wrong(); }
  render();
}
function scNext(){ sound.softClick(); state.scIdx=(state.scIdx+1)%state.words.length; initScramble(); render(); }
function scPrev(){ sound.softClick(); state.scIdx=(state.scIdx-1+state.words.length)%state.words.length; initScramble(); render(); }
function scReshuffle(){ sound.shuffle(); initScramble(); render(); }

      <circle cx="65" cy="170" r="13" fill="#475569"/>
      <circle cx="65" cy="170" r="6" fill="#94a3b8"/>
      <circle cx="200" cy="170" r="20" fill="#1f2937" stroke="#374151" stroke-width="2"/>
      <circle cx="200" cy="170" r="13" fill="#475569"/>
      <circle cx="200" cy="170" r="6" fill="#94a3b8"/>
      <circle cx="135" cy="125" r="8" fill="#fbbf24"/>
      <rect x="130" y="120" width="10" height="14" fill="#3b82f6" rx="2"/>
      ${left===0?`<text x="140" y="215" text-anchor="middle" font-size="13" fill="#94a3b8" font-style="italic">all boxes fell off!</text>`:''}
    </svg>
  `;
}

function svgMai(wrong){
  const left = 6 - wrong;
  const blossoms = [
    {cx:75,cy:65},{cx:130,cy:45},{cx:175,cy:70},
    {cx:60,cy:115},{cx:120,cy:100},{cx:185,cy:115},
  ];
  const flower = (cx,cy)=>{
    const r = 7;
    return `<g>
      ${[0,1,2,3,4].map(i=>{
        const a = (i*72-90)*Math.PI/180;
        return `<circle cx="${cx + Math.cos(a)*7}" cy="${cy + Math.sin(a)*7}" r="${r}" fill="#fde047" stroke="#facc15" stroke-width="1"/>`;
      }).join('')}
      <circle cx="${cx}" cy="${cy}" r="3.5" fill="#dc2626"/>
      <circle cx="${cx-1}" cy="${cy-1}" r="1.2" fill="#fef3c7"/>
    </g>`;
  };
  return `
    <svg viewBox="0 0 240 220" class="lotus-svg">
      <path d="M 88 180 L 96 215 L 158 215 L 166 180 Z" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
      <rect x="84" y="174" width="86" height="13" fill="#fbbf24" stroke="#92400e" stroke-width="1.5" rx="2"/>
      <text x="127" y="184" text-anchor="middle" font-size="9" fill="#7f1d1d" font-weight="bold">TẾT</text>
      <path d="M 127 180 L 122 130 L 122 75" stroke="#7c2d12" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M 122 130 L 75 105 L 55 110" stroke="#7c2d12" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M 122 105 L 175 75 L 190 110" stroke="#7c2d12" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M 122 75 L 85 55 L 70 60" stroke="#7c2d12" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 122 75 L 165 55 L 180 65" stroke="#7c2d12" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 122 95 L 105 80" stroke="#7c2d12" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M 122 115 L 145 105" stroke="#7c2d12" stroke-width="2" fill="none" stroke-linecap="round"/>
      ${blossoms.slice(0, left).map(b => flower(b.cx, b.cy)).join('')}
      ${left===0?`<text x="120" y="155" text-anchor="middle" font-size="13" fill="#94a3b8" font-style="italic">no blossoms for Tết...</text>`:''}
    </svg>
  `;
}

const SCENES = [
  { id:'lotus', emoji:'🪷', title:'Save the Lotus', desc:'Each wrong guess, a petal falls.<br><i>Mỗi lần đoán sai, một cánh sen rơi.</i>', win:'🌸 You saved the lotus!', lose:'The lotus wilted.', svg:svgLotus },
  { id:'pho', emoji:'🍜', title:'Save the Phở', desc:'Save the toppings before the phở gets cold!<br><i>Cứu tô phở trước khi nguội!</i>', win:'🍜 Hot phở rescued!', lose:'The phở got cold &amp; empty...', svg:svgPho },
  { id:'banhmi', emoji:'🥖', title:'Save the Bánh Mì', desc:'Catch the fillings before they fall out!<br><i>Đừng để nhân bánh mì rơi hết!</i>', win:'🥖 Bánh mì preserved!', lose:'All the filling fell out!', svg:svgBanhMi },
  { id:'coffee', emoji:'☕', title:'Save the Cà Phê Sữa Đá', desc:'Hurry — the ice is melting!<br><i>Nhanh lên, đá đang tan!</i>', win:'☕ Iced coffee saved on time!', lose:'All ice melted! Warm coffee is sad coffee.', svg:svgCoffee },
  { id:'banhchung', emoji:'🎋', title:'Save the Bánh Chưng', desc:'Save Tết — guess before the strings untie!<br><i>Cứu bánh chưng cho Tết!</i>', win:'🎋 Tết is saved!', lose:'Bánh chưng came unwrapped!', svg:svgBanhChung },
  { id:'motorbike', emoji:'🛵', title:'Save the Delivery', desc:'Boxes are wobbling on the xe máy — keep them on!<br><i>Giữ thùng hàng trên xe máy!</i>', win:'🛵 Delivery successful!', lose:'All boxes fell off the xe máy!', svg:svgMotorbike },
  { id:'mai', emoji:'🌼', title:'Save the Cây Mai', desc:'Make Cây Mai bloom for Tết!<br><i>Giúp cây mai nở hoa đón Tết!</i>', win:'🌼 Mai bloomed in time for Tết!', lose:'The mai tree has no blossoms for Tết...', svg:svgMai },
];

function pickScene(){ return SCENES[Math.floor(Math.random()*SCENES.length)]; }

function initLotus(){
  if(!state.words.length){ state.lotusWord=null; return; }
  state.lotusWord = state.words[Math.floor(Math.random()*state.words.length)];
  state.lotusScene = pickScene();
  state.lotusGuessed = new Set();
  state.lotusWrong = 0;
  state.lotusEnded = false;
}
function renderLotus(app){
  if(!state.lotusWord || !state.lotusScene){ app.innerHTML = `<div class="empty">Add words first.</div>`; return; }
  const w = state.lotusWord;
  const sc = state.lotusScene;
  const display = w.word.split('').map(ch => /[a-z]/i.test(ch) ? (state.lotusGuessed.has(ch.toLowerCase())?ch:'_') : ch);
  const won = !display.includes('_');
  const lost = state.lotusWrong >= state.lotusMax;
  const done = won||lost;
  const letters = 'abcdefghijklmnopqrstuvwxyz'.split('');

  app.innerHTML = `
    <div class="row-between" style="margin-bottom:1rem">
      <div>
        <h2 style="font-size:1.4rem">${sc.emoji} ${sc.title}</h2>
        <p style="color:#64748b;font-size:.9rem;margin-top:.2rem">${sc.desc}</p>
      </div>
      <button class="btn btn-secondary" onclick="lotusNew()">🔄 New round (random scene)</button>
    </div>
    <div class="card lotus-stage" style="padding:1.75rem 1rem">
      ${sc.svg(state.lotusWrong)}
      <div class="badge" style="font-size:1rem;padding:.5rem 1rem">Lives left: ${Math.max(0, state.lotusMax - state.lotusWrong)} / ${state.lotusMax} · Wrong: ${state.lotusWrong}</div>

      <div class="lotus-hint">
        <b>Meaning:</b> ${escapeHtml(w.meaning||'(no meaning)')}
        ${w.translation?`<br><span style="color:#7c3aed">🇻🇳 ${escapeHtml(w.translation)}</span>`:''}
        ${w.ipa?`<br><span style="font-family:ui-monospace,monospace;color:#0891b2">${escapeHtml(w.ipa)}</span>`:''}
        <br><span style="color:#94a3b8;font-size:.95rem">${w.word.length} letter${w.word.length===1?'':'s'}</span>
      </div>

      <div class="lotus-word">
        ${display.map(ch=>`<span class="lotus-letter">${ch===' '?'&nbsp;':escapeHtml(ch)}</span>`).join('')}
      </div>

      ${done ? `
        <div style="text-align:center">
          ${won ? `<div style="font-size:1.5rem;color:#10b981;font-weight:700">${sc.win}</div>`
                : `<div style="font-size:1.25rem;color:#ef4444;font-weight:600">${sc.lose}<br><span style="font-size:1rem;color:#475569">The word was <b>${escapeHtml(w.word)}</b></span></div>`}
          <button class="btn btn-primary" style="margin-top:1.25rem;font-size:1rem;padding:.7rem 1.5rem" onclick="lotusNew()">Play another →</button>
        </div>
      ` : `
        <div class="lotus-keys">
          ${letters.map(L=>{
            const guessed = state.lotusGuessed.has(L);
            const inWord = w.word.toLowerCase().includes(L);
            const cls = guessed ? (inWord?'hit':'miss') : '';
            return `<button class="lotus-key ${cls}" onclick="lotusGuess('${L}')" ${guessed?'disabled':''}>${L.toUpperCase()}</button>`;
          }).join('')}
        </div>
      `}
    </div>
  `;
}
function lotusNew(){ sound.shuffle(); initLotus(); render(); }
function lotusGuess(letter){
  const w = state.lotusWord;
  if(!w || state.lotusGuessed.has(letter) || state.lotusEnded) return;
  state.lotusGuessed.add(letter);
  const inWord = w.word.toLowerCase().includes(letter);
  if(inWord){ sound.petalSave(); }
  else { state.lotusWrong++; sound.petalFall(); }
  const display = w.word.split('').map(ch => /[a-z]/i.test(ch) ? (state.lotusGuessed.has(ch.toLowerCase())?ch:'_') : ch);
  const won = !display.includes('_');
  const lost = state.lotusWrong >= state.lotusMax;
  if((won||lost) && !state.lotusEnded){
    state.lotusEnded = true;
    setTimeout(()=>{ won ? sound.fanfare() : sound.sad(); }, 400);
  }
  render();
}
document.addEventListener('keydown', e=>{
  if(state.view!=='lotus') return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const k = e.key.toLowerCase();
  if(/^[a-z]$/.test(k)) lotusGuess(k);
});

render();
</script>
